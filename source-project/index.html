<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eef1f6" />
    <title>Редактор отчёта по СИМ</title>
    <style>
      .boot-screen { min-height: 100vh; display: grid; place-items: center; padding: 24px; box-sizing: border-box; font-family: Arial, sans-serif; background: #eef1f6; color: #2d3440; }
      .boot-card { max-width: 680px; padding: 24px; background: white; border: 1px solid #d8dde7; border-radius: 16px; box-shadow: 0 14px 40px rgba(34,42,56,.12); }
      .boot-card h1 { margin: 0 0 8px; font-size: 22px; }
      .boot-card p { margin: 0; line-height: 1.5; color: #6c7484; }
      .boot-card[data-error="true"] p { color: #b3263a; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-screen">
        <div class="boot-card" id="boot-card">
          <h1>Загрузка редактора…</h1>
          <p>Если сообщение не исчезнет, откройте страницу с принудительным обновлением: Ctrl/Cmd + Shift + R.</p>
        </div>
      </div>
    </div>
    <script>
      window.addEventListener('error', function (event) {
        var card = document.getElementById('boot-card');
        if (!card) return;
        card.setAttribute('data-error', 'true');
        card.innerHTML = '<h1>Не удалось запустить редактор</h1><p>' +
          String(event.message || 'Ошибка загрузки JavaScript') +
          '. Проверьте, что GitHub Pages публикует папку dist через GitHub Actions.</p>';
      });
      window.addEventListener('unhandledrejection', function (event) {
        var card = document.getElementById('boot-card');
        if (!card) return;
        card.setAttribute('data-error', 'true');
        card.innerHTML = '<h1>Не удалось запустить редактор</h1><p>' +
          String((event.reason && event.reason.message) || event.reason || 'Неизвестная ошибка') +
          '</p>';
      });
    </script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
